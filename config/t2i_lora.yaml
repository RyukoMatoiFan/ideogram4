# Regular text-to-image (subject / style) LoRA -- the plain LoRA path (no editing,
# no reference frame). Dataset: a folder of images with matching .txt captions
# (kohya/ai-toolkit layout: name.jpg + name.txt). Encoder-free after a one-time
# precompute. Ship the trained adapter to BOTH transformers at inference (eval_t2i.py).
# Run: python train_t2i_lora.py --config config/t2i_lora.yaml
paths:
  weights: ideogram-ai/ideogram-4-fp8
  data_root: data/subject-dataset
  output_dir: runs/t2i-lora

lora:
  rank: 32

data:
  resolution: 512

optim:
  lr: 2.0e-4
  steps: 1500
  batch: 1
  accum: 4
  warmup: 50
  optimizer: adamw
  grad_checkpointing: true
  cfg_dropout_prob: 0.1
  lr_scheduler: cosine

logging:
  log_every: 25
  ckpt_every: 500
  sample_every: 250      # 0 = off; decode [generated|target] previews to <output_dir>/samples
  sample_count: 4        # how many prompts to preview
  sample_steps: 20       # sampler steps for previews
  sample_guidance: 3.0
